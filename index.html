<!DOCTYPE html>
<html>

<head>

  <title>Registrasi Wajah</title>

  <script src="face-api.min.js"></script>

  <style>

    body{
      font-family: Arial;
      text-align:center;
      background:#f5f5f5;
      padding:20px;
    }

    video{
      border:4px solid #333;
      border-radius:10px;
      margin-top:10px;
      background:black;
    }

    input{
      padding:10px;
      margin:5px;
      width:250px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button{
      padding:12px 20px;
      font-size:16px;
      cursor:pointer;
      border:none;
      border-radius:10px;
      margin:5px;
    }

    #statusIcon{
      font-size:80px;
      margin-top:20px;
      display:none;
    }

    .success{
      color:green;
    }

    .failed{
      color:red;
    }

    #loadingText{
      font-size:18px;
      font-weight:bold;
      margin-bottom:15px;
    }

  </style>

</head>

<body>

<h2>Registrasi Wajah Personel</h2>

<h3 id="loadingText">
  Loading AI Model...
</h3>

<input type="text" id="idpersonel" placeholder="ID Personel">

<br>

<input type="text" id="nama" placeholder="Nama Personel">

<br>

<input type="text" id="vendor" placeholder="Vendor">

<br>

<input type="text" id="jabatan" placeholder="Jabatan">

<br><br>

<video
  id="video"
  width="320"
  height="240"
  autoplay
  muted
  playsinline>
</video>

<br><br>

<button onclick="startCamera()">
  Aktifkan Kamera
</button>

<button onclick="registerFace()">
  Simpan Registrasi
</button>

<div id="statusIcon"></div>

<script>

const video = document.getElementById("video");

async function startCamera() {

  try {

    const stream =
      await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "user"
        },
        audio: false
      });

    video.srcObject = stream;

    await video.play();

    console.log("CAMERA ON");

    alert("Kamera aktif");

  } catch(err){

    console.error(err);

    alert(
      "Kamera gagal diakses. Pastikan izin kamera diaktifkan."
    );

  }
}

async function loadModels() {

  try {

    document.getElementById("loadingText")
      .innerHTML = "Loading AI Model...";

    await faceapi.nets.tinyFaceDetector
      .loadFromUri('./models');

    await faceapi.nets.faceLandmark68Net
      .loadFromUri('./models');

    await faceapi.nets.faceRecognitionNet
      .loadFromUri('./models');

    console.log("MODEL LOADED");

    document.getElementById("loadingText")
      .innerHTML = "AI Ready ✅";

  } catch(err){

    console.error(err);

    document.getElementById("loadingText")
      .innerHTML = "Model gagal dimuat ❌";

  }
}

window.onload = () => {

  loadModels();

};

function showSuccess(){

  const status = document.getElementById("statusIcon");

  status.style.display = "block";

  status.className = "success";

  status.innerHTML = "✅";

  setTimeout(() => {

    status.style.display = "none";

  }, 3000);

}

function showFailed(){

  const status = document.getElementById("statusIcon");

  status.style.display = "block";

  status.className = "failed";

  status.innerHTML = "❌";

  setTimeout(() => {

    status.style.display = "none";

  }, 3000);

}

async function registerFace() {

  const idpersonel =
    document.getElementById("idpersonel").value;

  const nama =
    document.getElementById("nama").value;

  const vendor =
    document.getElementById("vendor").value;

  const jabatan =
    document.getElementById("jabatan").value;

  if(
    !idpersonel ||
    !nama ||
    !vendor ||
    !jabatan
  ){

    alert("Lengkapi data");

    showFailed();

    return;
  }

  try {

    const detection = await faceapi
      .detectSingleFace(
        video,
        new faceapi.TinyFaceDetectorOptions()
      )
      .withFaceLandmarks()
      .withFaceDescriptor();

    if(!detection){

      alert("Wajah tidak terdeteksi");

      showFailed();

      return;
    }

    const descriptor =
      Array.from(detection.descriptor);

    await fetch(
      "https://script.google.com/macros/s/AKfycbwFCldJFXETEOxlxAcI9vYZR7ZD73cwN5LGwbKg4LyVmpVEOarYY3pV8E6HsOguHE36/exec",
      {

        method: "POST",

        mode: "no-cors",

        body: new URLSearchParams({

          idpersonel:idpersonel,

          nama:nama,

          vendor:vendor,

          jabatan:jabatan,

          descriptor:JSON.stringify(descriptor)

        })

      }
    );

    showSuccess();

    alert("Registrasi berhasil");

    document.getElementById("idpersonel").value = "";
    document.getElementById("nama").value = "";
    document.getElementById("vendor").value = "";
    document.getElementById("jabatan").value = "";

  } catch(err){

    console.error(err);

    showFailed();

    alert("Gagal registrasi");

  }
}

</script>

</body>
</html>
